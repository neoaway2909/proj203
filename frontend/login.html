<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encrypted Packet Dashboard - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="login-container glass-panel">
        <div class="login-header">
            <h1 class="logo-text">SECURE<span>NET</span></h1>
            <p>Real-time Packet Visualization</p>
        </div>
        
        <form id="login-form">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="admin / user" required>
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="admin123 / user123" required>
            </div>
            
            <button type="submit" class="btn-primary">ACCESS TERMINAL</button>
            <p id="login-error" class="error-text hidden">Invalid credentials. Access Denied.</p>
        </form>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
